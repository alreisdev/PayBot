# =============================================================
# PayBot Financial Service - GCP Profile
# Activated via: SPRING_PROFILES_ACTIVE=gcp
# =============================================================
# Secrets are injected as env vars from K8s Secrets
# (synced from GCP Secret Manager via External Secrets Operator)

# Cloud SQL (PostgreSQL 16 via private IP)
spring.datasource.url=jdbc:postgresql://${CLOUDSQL_PRIVATE_IP}:5432/paybotdb
spring.datasource.username=paybot
spring.datasource.password=${DB_PASSWORD}

# RabbitMQ (running in GKE as StatefulSet)
spring.rabbitmq.host=rabbitmq.paybot.svc.cluster.local
spring.rabbitmq.port=5672
spring.rabbitmq.username=paybot
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Tracing - OTLP to OTel Collector sidecar → Cloud Trace
otel.exporter.otlp.endpoint=http://localhost:4317
management.tracing.sampling.probability=0.1

# Actuator - K8s health probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=when-authorized

# Swagger disabled in GCP
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
