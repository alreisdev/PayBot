# Application
spring.application.name=paybot-financial-service

# Server
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/paybotdb
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:paybot}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Let Flyway handle schema, Hibernate does nothing
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway - handles all schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:paybot}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:changeme}
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# RabbitMQ listener observation (coexists with manual ACK)
spring.rabbitmq.listener.simple.observation-enabled=true

# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.level.com.agile.paybot=INFO
logging.level.org.flywaydb=INFO

# Actuator - restrict exposed endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.health.show-details=never

# Swagger UI - disabled in docker profile (override in application-docker.properties)
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
