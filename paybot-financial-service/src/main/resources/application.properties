# Application
spring.application.name=paybot-financial-service

# Server
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/paybotdb
spring.datasource.username=paybot
spring.datasource.password=paybot123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Let Flyway handle schema, Hibernate does nothing
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway - handles all schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=paybot
spring.rabbitmq.password=paybot123
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# RabbitMQ listener observation (coexists with manual ACK)
spring.rabbitmq.listener.simple.observation-enabled=true

# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.level.com.agile.paybot=DEBUG
logging.level.org.flywaydb=DEBUG
