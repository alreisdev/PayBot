# Application
spring.application.name=paybot-ai-service

# Server
server.port=8080

# Spring AI - Google GenAI (Vertex AI) Configuration
spring.ai.google.genai.project-id=paybot-gemini
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=paybot
spring.rabbitmq.password=paybot123
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Financial Service URL
financial.service.url=http://localhost:8081

# OpenFeign - enable CircuitBreaker fallbacks
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j CircuitBreaker defaults
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# Resilience4j TimeLimiter (timeout for Feign calls)
resilience4j.timelimiter.configs.default.timeout-duration=5s

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# RabbitMQ listener observation (coexists with manual ACK)
spring.rabbitmq.listener.simple.observation-enabled=true

# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.level.com.agile.paybot=DEBUG
logging.level.org.springframework.ai=DEBUG
