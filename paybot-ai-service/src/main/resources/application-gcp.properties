# =============================================================
# PayBot AI Service - GCP Profile
# Activated via: SPRING_PROFILES_ACTIVE=gcp
# =============================================================
# Secrets are injected as env vars from K8s Secrets
# (synced from GCP Secret Manager via External Secrets Operator)

# RabbitMQ (running in GKE as StatefulSet)
spring.rabbitmq.host=rabbitmq.paybot.svc.cluster.local
spring.rabbitmq.port=5672
spring.rabbitmq.username=paybot
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Redis (GCP Memorystore via private IP)
# Memorystore BASIC tier uses network-level isolation (no AUTH).
# If upgrading to STANDARD_HA with auth_enabled, set REDIS_PASSWORD env var.
spring.data.redis.host=${MEMORYSTORE_HOST}
spring.data.redis.port=6379
spring.data.redis.password=

# Financial Service (K8s service discovery)
financial.service.url=http://paybot-financial-service.paybot.svc.cluster.local:8081

# Tracing - OTLP to OTel Collector sidecar → Cloud Trace
otel.exporter.otlp.endpoint=http://localhost:4317
management.tracing.sampling.probability=0.1

# Actuator - K8s health probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=when-authorized
