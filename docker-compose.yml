services:
  postgres:
    image: postgres:16-alpine
    container_name: paybot-postgres
    environment:
      - POSTGRES_DB=paybotdb
      - POSTGRES_USER=paybot
      - POSTGRES_PASSWORD=paybot123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paybot -d paybotdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: paybot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=paybot
      - RABBITMQ_DEFAULT_PASS=paybot123
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paybot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  zipkin:
    image: openzipkin/zipkin
    container_name: paybot-zipkin
    ports:
      - "9411:9411"
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  paybot-financial-service:
    build:
      context: .
      dockerfile: paybot-financial-service/Dockerfile
    container_name: paybot-financial-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/paybotdb
      - SPRING_DATASOURCE_USERNAME=paybot
      - SPRING_DATASOURCE_PASSWORD=paybot123
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=paybot
      - SPRING_RABBITMQ_PASSWORD=paybot123
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/internal/bills/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  paybot-ai-service:
    build:
      context: .
      dockerfile: paybot-ai-service/Dockerfile
    container_name: paybot-ai-service
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      paybot-financial-service:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/paybot-credentials.json
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=paybot
      - SPRING_RABBITMQ_PASSWORD=paybot123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - FINANCIAL_SERVICE_URL=http://paybot-financial-service:8081
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    volumes:
      - ./credentials:/app/credentials:ro
    networks:
      - paybot-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./paybot-ui
      dockerfile: Dockerfile
    container_name: paybot-frontend
    ports:
      - "4200:80"
    depends_on:
      paybot-ai-service:
        condition: service_healthy
    networks:
      - paybot-network

networks:
  paybot-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
