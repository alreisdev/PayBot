# paybot-ai-service Deployment.
# Handles chat via Gemini LLM, Spring AI function calling, Redis session history,
# and saga orchestration over RabbitMQ.
# Replace PROJECT_ID with your actual GCP project ID.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paybot-ai-service
  namespace: paybot
  labels:
    app: paybot-ai-service
    project: paybot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paybot-ai-service
      project: paybot
  template:
    metadata:
      labels:
        app: paybot-ai-service
        project: paybot
    spec:
      serviceAccountName: paybot-ksa
      containers:
        - name: paybot-ai-service
          image: gcr.io/paybot-gemini/paybot-ai-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: paybot-config
          env:
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
        # OTel Collector sidecar — receives OTLP traces and exports to Cloud Trace
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args: ["--config=/etc/otel/otel-collector-config.yaml"]
          ports:
            - containerPort: 4317
              protocol: TCP
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
