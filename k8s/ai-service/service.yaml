# ClusterIP service for paybot-ai-service.
# The frontend's nginx reverse-proxies /api/* to this service on port 8080.
apiVersion: v1
kind: Service
metadata:
  name: paybot-ai-service
  namespace: paybot
  labels:
    app: paybot-ai-service
    project: paybot
spec:
  type: ClusterIP
  selector:
    app: paybot-ai-service
    project: paybot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
