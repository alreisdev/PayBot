# ClusterIP service for paybot-financial-service.
# The AI service reaches it via http://paybot-financial-service:8081.
apiVersion: v1
kind: Service
metadata:
  name: paybot-financial-service
  namespace: paybot
  labels:
    app: paybot-financial-service
    project: paybot
spec:
  type: ClusterIP
  selector:
    app: paybot-financial-service
    project: paybot
  ports:
    - name: http
      port: 8081
      targetPort: 8081
