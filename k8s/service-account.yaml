# Kubernetes ServiceAccount bound to a GCP service account via Workload Identity.
# Replace PROJECT_ID with your actual GCP project ID.
# Ensure the IAM binding exists:
#   gcloud iam service-accounts add-iam-policy-binding \
#     paybot-sa@PROJECT_ID.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:PROJECT_ID.svc.id.goog[paybot/paybot-ksa]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paybot-ksa
  namespace: paybot
  labels:
    project: paybot
  annotations:
    iam.gke.io/gcp-service-account: paybot-sa@PROJECT_ID.iam.gserviceaccount.com
