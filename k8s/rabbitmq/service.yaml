# ClusterIP service for RabbitMQ.
# Other services connect via rabbitmq:5672 within the cluster.
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: paybot
  labels:
    app: rabbitmq
    project: paybot
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
    project: paybot
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
