# Application
spring.application.name=paybot

# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/paybotdb
spring.datasource.username=paybot
spring.datasource.password=paybot123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Let Flyway handle schema, Hibernate does nothing
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway - handles all schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Spring AI - Google GenAI (Vertex AI) Configuration
# Uses service account credentials for authentication
spring.ai.google.genai.project-id=paybot-gemini
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=paybot
spring.rabbitmq.password=paybot123
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging
logging.level.com.agile.paybot=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.flywaydb=DEBUG
