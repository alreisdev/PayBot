# Application
spring.application.name=paybot

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:paybotdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Spring AI - Google GenAI (Gemini) Configuration
# Set your Gemini API key as environment variable GEMINI_API_KEY
# Get your API key from: https://aistudio.google.com/apikey
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7

# Logging
logging.level.com.agile.paybot=DEBUG
logging.level.org.springframework.ai=DEBUG
